<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8 Months 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

a{ text-decoration:none; }

body{
margin:0;
font-family:"Poppins",sans-serif;
background:linear-gradient(135deg,#ffe0f3,#e9f0ff,#ffe9df);
background-size:300% 300%;
animation:bgShift 12s infinite alternate;
text-align:center;
overflow-x:hidden;
}

@keyframes bgShift{
from{background-position:left;}
to{background-position:right;}
}

h1{
margin-top:40px;
font-size:3rem;
font-family:"Dancing Script";
color:#ff3f8f;
}

h2{
margin-top:-10px;
font-size:1.2rem;
color:#ff7ab3;
}

/* grid same as previous page */

.grid{
width:90%;
max-width:600px;
margin:50px auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

/* button same style */

.btn{
background:rgba(255,255,255,0.85);
padding:25px 15px;
border-radius:22px;
border:2px solid #ffd7ea;
font-size:1.1rem;
font-weight:600;
color:#444;
box-shadow:0 8px 20px rgba(255,120,180,0.25);
transition:.3s;
}

.btn:hover{
background:white;
transform:scale(1.05);
color:#ff4f9a;
}

.date{
margin-top:6px;
font-size:.75rem;
font-weight:700;
color:#ff77a9;
background:#fff0f7;
padding:3px 12px;
border-radius:14px;
box-shadow:0 2px 6px rgba(255,140,185,.25);
display:inline-block;
}

/* back button */

.back{
display:inline-block;
padding:12px 25px;
background:#ffb6d9;
color:white;
border-radius:20px;
margin-bottom:40px;
font-weight:600;
}

/* floating hearts */

.heart{
position:fixed;
bottom:-20px;
color:#ff74bb;
opacity:.85;
animation:floatUp 7s linear infinite;
z-index:-1;
font-size:18px;
}

@keyframes floatUp{
from{transform:translateY(0);}
to{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<h1>💗 8 Months 💗</h1>
<h2>Two beautiful memories together ✨</h2>

<div class="grid">

<a class="btn" href="1ryear.html">
First Meet Anniversary
<div class="date">Our first meeting 💞</div>
</a>

<a class="btn" href="8months.html">
8th Month Anniversary
<div class="date">8 months of love ❤️</div>
</a>

</div>

<a class="back" href="1year_anniversary.html">← Back</a>

<script>

setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💗";
h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

},800);

</script>

</body>
</html>
